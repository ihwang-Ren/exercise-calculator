{% load static %}

<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>운동 칼로리 계산기</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI','맑은 고딕',sans-serif;
}

body{
    background:linear-gradient(
        180deg,
        #f6f8fc,
        #eef2f8
    );
    min-height:100vh;
}

.container{
    max-width:550px;
    margin:40px auto;
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#1428A0;
    font-size:34px;
}

.logo p{
    color:#777;
    margin-top:8px;
}

.card{
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.08);
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

select,
input{
    width:100%;
    padding:14px;
    border:1px solid #d9dce3;
    border-radius:15px;
    font-size:15px;
}

select:focus,
input:focus{
    outline:none;
    border-color:#1428A0;
}

button{
    width:100%;
    margin-top:25px;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#1428A0;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.95;
}

.result{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    background:
        linear-gradient(
            135deg,
            #1428A0,
            #4674ff
        );

    color:white;
}

.result h2{
    margin-bottom:15px;
}

.info{
    margin-bottom:8px;
}

.kcal{
    text-align:center;
    margin-top:15px;
    font-size:42px;
    font-weight:bold;
}

.small{
    font-size:18px;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
    font-size:13px;
}

@keyframes shake {

    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
    100%{transform:translateX(0);}

}

</style>

</head>

<body>

<div class="container">

```
<div class="logo">
    <h1>🏃 운동 칼로리 계산기</h1>
    <p>건강한 운동 습관 만들기</p>
</div>

<div class="card">

    <form method="post">

        {% csrf_token %}

        <label>운동 종류</label>

        <select name="exercise">

            {% for exercise in exercises %}
                <option value="{{ exercise }}">
                    {{ exercise }}
                </option>
            {% endfor %}

        </select>

        <label>운동 시간 (분)</label>

        <input
            type="number"
            name="minutes"
            min="1"
            required>

        <label>운동 강도</label>

        <select name="intensity">
            <option value="낮음">낮음</option>
            <option value="중간">중간</option>
            <option value="높음">높음</option>
        </select>

        <button type="submit">
            🔥 칼로리 계산하기
        </button>

    </form>

    {% if result %}

    <div class="result">

        <h2>계산 결과</h2>

        <div class="info">
            운동 : {{ exercise }}
        </div>

        <div class="info">
            시간 : {{ minutes }}분
        </div>

        <div class="info">
            강도 : {{ intensity }}
        </div>

        <div class="kcal">
            {{ result|floatformat:1 }}
            <span class="small">kcal</span>
        </div>

    </div>

    {% endif %}

</div>

<div class="footer">
    Exercise Calorie Calculator
</div>
```

</div>

<script>

const secretCode = [
"ArrowUp",
"ArrowUp",
"ArrowDown",
"ArrowDown",
"ArrowLeft",
"ArrowRight",
"ArrowLeft",
"ArrowRight",
"b",
"a",
"Enter"
];

let userInput = [];

document.addEventListener("keydown", function(e){

    userInput.push(e.key);

    if(userInput.length > secretCode.length){
        userInput.shift();
    }

    if(JSON.stringify(userInput)
        === JSON.stringify(secretCode)){

        activateMobiusRain();

        userInput = [];
    }

});

function activateMobiusRain(){

    document.body.style.animation =
        "shake 0.5s";

    setTimeout(()=>{
        document.body.style.animation = "";
    },500);

    alert("에이메스 등장!");

    for(let i=0;i<80;i++){

        setTimeout(()=>{

            createMobius();

        },i*80);

    }

}

function createMobius(){

    const img = document.createElement("img");

    img.src =
    "{% static 'images/mobius.png' %}";

    img.style.position = "fixed";
    img.style.left =
        Math.random()*window.innerWidth+"px";

    img.style.top = "-120px";

    img.style.width = "90px";

    img.style.pointerEvents = "none";

    img.style.zIndex = "9999";

    document.body.appendChild(img);

    let pos = -120;

    const speed =
        Math.random()*5 + 3;

    const fall = setInterval(()=>{

        pos += speed;

        img.style.top = pos+"px";

        if(pos > window.innerHeight){

            clearInterval(fall);

            img.remove();

        }

    },16);

}

</script>

</body>
</html>
